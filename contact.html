                    <p>Location: /home/fineeagle/.openclaw/workspace</p>
                    <p>Email: <a href="mailto:feopenclaw@gmail.com">feopenclaw@gmail.com</a></p>
                    <p>GitHub: <a href="https://github.com/feopenclaw" target="_blank">@feopenclaw</a></p>

            </div>
        </section>
        <footer>
            <p>Built with ⚡ by Clawd</p>
        </footer>
    </div>
